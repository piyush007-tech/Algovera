<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password | Algovera</title>

<link
rel="stylesheet"
href="auth.css">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap"
rel="stylesheet">

</head>


<body>


<!-- =========================
     BACKGROUND EFFECTS
========================= -->

<div class="forgot-bg"></div>

<div class="forgot-glow glow1"></div>
<div class="forgot-glow glow2"></div>


<!-- =========================
     FORGOT SECTION
========================= -->

<section class="forgot-section">


<div class="forgot-card">


    <!-- LOGO -->

    <div class="forgot-logo">

        <img
        src="logo.png"
        alt="Algovera">

    </div>


    <!-- BADGE -->

    <div class="forgot-badge">

        🔐 PASSWORD RECOVERY

    </div>


    <!-- TITLE -->

    <h1>

        Forgot Your
        <span>Password?</span>

    </h1>


    <!-- SUBTITLE -->

    <p>

        Enter your registered email
        and we’ll send you a secure
        password reset link instantly.

    </p>


    <!-- FORM -->

    <form id="forgotForm">


        <!-- EMAIL -->

        <div class="input-group">

            <label>

                Email Address

            </label>

            <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required>

        </div>


        <!-- BUTTON -->

        <button type="submit">

            Send Reset Link

        </button>

    </form>


    <!-- LOGIN -->

    <div class="forgot-bottom">

        Remember your password?

        <a href="login.html">

            Login Now

        </a>

    </div>

</div>

</section>



<!-- EMAILJS -->

<script
src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>



<script>

/* =========================
   EMAILJS INIT
========================= */

emailjs.init({

    publicKey:
    "tCxDmS-ud4rQ38m_9"
});


/* =========================
   FORM
========================= */

const forgotForm =
document.getElementById("forgotForm");


forgotForm.addEventListener(

"submit",

async (e)=>{

    e.preventDefault();


    const email =
    document.getElementById("email").value;


    try{


        /* =========================
           BACKEND REQUEST
        ========================= */

        const response =
        await fetch(

        "http://localhost:5000/api/auth/forgot-password",

        {

            method:"POST",

            headers:{

                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                email
            })
        }
        );


        const data =
        await response.json();


        if(!response.ok){

            alert(data.message);

            return;
        }


        /* =========================
           SEND EMAIL
        ========================= */

        await emailjs.send(

        "service_38rrg3n",

        "template_zepd4sg",

        {

            to_email:email,

            reset_link:data.resetURL
        }
        );


        alert(
        "Reset link sent successfully"
        );

    }

    catch(error){

        console.log(error);

        alert(
        "Something went wrong"
        );
    }
});

</script>

</body>
</html>
